server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ =404;
    }

    # css/js/images are safe to cache aggressively; they only change with a new image build.
    location ~* \.(?:css|js|png|jpe?g|svg|webp|woff2?|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # data/*.json (default menu + translations) is fetched at runtime by js/app.js and can
    # change independently of a rebuild (e.g. mounted as a volume) - keep it short-cached
    # so updates show up without requiring a hard refresh.
    location ~* \.json$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }
}
