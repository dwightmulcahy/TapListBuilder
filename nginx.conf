server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # index.html must always be revalidated - it's what points to the versioned CSS/JS
    # below, so if it got cached stale, users would keep loading old assets forever.
    location = / {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location / {
        try_files $uri $uri/ =404;
    }

    # css/js are cache-busted with a ?v=<version>-<sha> query string baked in at Docker
    # build time (see Dockerfile), so a new deploy always references genuinely new URLs.
    # Safe to cache these aggressively/indefinitely - the URL itself changes on rebuild.
    location ~* \.(?:css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # images/fonts/icons are safe to cache aggressively; they rarely change once added.
    location ~* \.(?:png|jpe?g|svg|webp|woff2?|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # data/*.json (default menu + translations) is fetched at runtime by js/app.js and can
    # change independently of a rebuild (e.g. mounted as a volume) - keep it short-cached
    # so updates show up without requiring a hard refresh.
    location ~* \.json$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }
}
